<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Contato - Mansão Maromba</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-danger">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">🏠 Mansão Maromba</a>
  </div>
</nav>

<div class="container my-5">

<div class="card bg-secondary text-light mb-4">
  <div class="card-body">
    <h5 class="card-title">Fale Conosco</h5>
    <p class="card-text">Dúvidas ou dúvidas sobre nossos drinks? Manda aí!</p>
  </div>
</div>

<div class="accordion mb-4" id="faq">
  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#item1">
        Horário de Atendimento
      </button>
    </h2>
    <div id="item1" class="accordion-collapse collapse show">
      <div class="accordion-body">
        Seg. a Sab. – 10h às 22h
      </div>
    </div>
  </div>
</div>

<form>
  <div class="mb-3">
    <label class="form-label">Nome</label>
    <input type="text" class="form-control">
  </div>
  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" class="form-control">
  </div>
  <div class="mb-3">
    <label class="form-label">Mensagem</label>
    <textarea class="form-control"></textarea>
  </div>
  <button type="submit" class="btn btn-danger">Enviar</button>
</form>

<footer class="bg-black text-center text-light p-3 mt-4">
  Venda proibida para menores de 18 anos. Beba com responsabilidade.
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
